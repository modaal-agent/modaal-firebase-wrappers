# Crashlytics dSYM upload post-build script for XcodeGen
#
# Add this to your app target's postBuildScripts in xcodegen.yml.
# Requires GOOGLE_APP_ID from your GoogleService-Info.plist.
#
# Reference: https://firebase.google.com/docs/crashlytics/get-deobfuscated-reports

postBuildScripts:
  - name: "Upload Crashlytics dSYMs"
    script: |
      if [ "${CONFIGURATION}" = "Release" ]; then
        "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk-xcframeworks/FirebaseCrashlytics/run"
      fi
    inputFiles:
      - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}"
      - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${PRODUCT_NAME}"
      - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Info.plist"
      - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist"
      - "$(TARGET_BUILD_DIR)/$(EXECUTABLE_PATH)"
