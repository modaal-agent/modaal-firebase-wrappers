name: SampleApp
options:
  createIntermediateGroups: true
  developmentLanguage: en
packages:
  ModaalFirebase:
    path: ../..
targets:
  SampleApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources: [SampleApp]
    info:
      path: SampleApp/Info.plist
      properties:
        # Without this, iOS falls back to a legacy launch image and
        # letterboxes the app with black bars top/bottom.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        CODE_SIGNING_ALLOWED: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: dev.modaal.firebase.sample-app
    dependencies:
      - package: ModaalFirebase
        product: ModaalFirebaseCore
      - package: ModaalFirebase
        product: ModaalFirebaseAnalytics
      - package: ModaalFirebase
        product: ModaalFirebaseCrashlytics
      - package: ModaalFirebase
        product: ModaalFirebaseAuth
      - package: ModaalFirebase
        product: ModaalFirestore
      - package: ModaalFirebase
        product: ModaalCloudStorage
      - package: ModaalFirebase
        product: ModaalFirebaseMessaging
      - package: ModaalFirebase
        product: ModaalFirebaseRemoteConfig
